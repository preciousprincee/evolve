<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evolve — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0B0E14;
        color: #F5F3FF;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      p {
        color: #9CA3B8;
        line-height: 1.5;
      }
      .orb {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 999px;
        background: linear-gradient(135deg, #7C6CF6, #4FD1C5);
        filter: blur(0.5px);
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="orb"></div>
      <h1>You're offline</h1>
      <p>Evolve needs a connection to reach your companion. Your recent conversations and memories are still here — reconnect when you're ready.</p>
    </div>
  </body>
</html>
